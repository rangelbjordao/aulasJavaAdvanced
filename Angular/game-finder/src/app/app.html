<h1 class="text-4xl font-bold text-center">Game Finder</h1>

<section class="flex flex-wrap gap-6 px-6 mt-6 justify-center">
  @for (jogo of jogos; track jogo.slug) {
    <game-card
      [gameName]="jogo.nome"
      [recommendation]="recommendations()[jogo.slug]?.recommendation ?? ''"
      [stars]="recommendations()[jogo.slug]?.stars ?? ''"
      [explanation]="recommendations()[jogo.slug]?.explanation ?? ''"
      (click)="buscar(jogo.slug)"
    >
    </game-card>
  }
</section>

<router-outlet></router-outlet>
