<h1 class="text-lg font-semibold mb-6">Cadastrar Filme/Serie</h1>

<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md space-y-4"
>
  <h2 class="text-xl font-semibold text-gray-800">Cadastrar Filme / Série</h2>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1"> Título </label>

    <input
      type="text"
      formControlName="title"
      placeholder="Digite o título"
      class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1"> Plataforma </label>

    <input
      type="text"
      formControlName="platform"
      placeholder="Netflix, Prime Video..."
      class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <button
    type="submit"
    class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
  >
    Cadastrar
  </button>
</form>
